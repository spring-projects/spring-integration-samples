description = 'Oracle Stored Procedures Sample'

apply plugin: 'application'

application {
	mainClass = 'org.springframework.integration.samples.storedprocedure.Main'
}

dependencies {
	api 'org.springframework.integration:spring-integration-jdbc'
	api "com.oracle.database.jdbc:ojdbc11:$oracleDriverVersion"
	api "org.apache.logging.log4j:log4j-core:$log4jVersion"
}

test {
	exclude '**/StringConversionServiceTest*'
}
